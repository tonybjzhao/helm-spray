name: Release on github

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Make release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Make release
        run: make dist
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          files: _dist/helm-spray*
