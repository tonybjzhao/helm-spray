<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>helm-spray</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #273449;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #22d3ee;
      --ok: #34d399;
      --warn: #fbbf24;
      --dim: #64748b;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      display: flex; align-items: baseline; gap: 12px;
      padding: 18px 24px; border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 20px; margin: 0; letter-spacing: .3px; }
    header .tag { color: var(--accent); font-weight: 700; }
    header .sub { color: var(--muted); font-size: 13px; }
    main { display: grid; grid-template-columns: 340px 1fr; min-height: calc(100vh - 61px); }
    .config { padding: 20px; border-right: 1px solid var(--border); background: var(--panel); }
    .config h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0 0 14px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
    .field input, .field textarea {
      width: 100%; padding: 9px 10px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--panel-2); color: var(--text); font-size: 13px; font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 58px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .field .hint { font-size: 11px; color: var(--dim); margin-top: 4px; }
    .row { display: flex; gap: 10px; }
    .row .field { flex: 1; }
    .checkbox { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text); }
    .checkbox input { width: auto; }
    button.primary {
      width: 100%; padding: 11px; border: none; border-radius: 8px; cursor: pointer;
      background: linear-gradient(90deg, var(--accent), var(--accent-2)); color: #00121b; font-weight: 700; font-size: 14px;
    }
    button.primary:disabled { opacity: .6; cursor: progress; }
    .canvas { padding: 24px; overflow: auto; }
    .empty { color: var(--muted); text-align: center; margin-top: 80px; font-size: 14px; }
    .err { background: #4c1d24; border: 1px solid #7f1d1d; color: #fecaca; padding: 12px 14px; border-radius: 8px; white-space: pre-wrap; font-size: 13px; }
    .plan-head { display: flex; gap: 16px; align-items: baseline; margin-bottom: 18px; flex-wrap: wrap; }
    .plan-head .name { font-size: 16px; font-weight: 700; }
    .plan-head .meta { color: var(--muted); font-size: 13px; }
    .tier { border: 1px solid var(--border); border-radius: var(--radius); background: var(--panel); margin-bottom: 0; }
    .tier-label { padding: 8px 14px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); letter-spacing: .04em; }
    .tier-label b { color: var(--accent); }
    .tier-body { display: flex; flex-wrap: wrap; gap: 12px; padding: 14px; }
    .release {
      min-width: 180px; border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; background: var(--panel-2);
    }
    .release.skipped { opacity: .45; }
    .release .r-name { font-weight: 700; font-size: 14px; }
    .release .r-sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .badges { margin-top: 9px; display: flex; gap: 6px; flex-wrap: wrap; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted); }
    .badge.on { color: var(--ok); border-color: var(--ok); }
    .badge.off { color: var(--warn); border-color: var(--warn); }
    .arrow { text-align: center; color: var(--dim); font-size: 18px; padding: 4px 0; }
  </style>
</head>
<body>
  <header>
    <h1><span class="tag">helm-spray</span></h1>
    <span class="sub">configure and visualise a weight-ordered umbrella deployment</span>
  </header>
  <main>
    <section class="config">
      <h2>Configuration</h2>
      <form id="form">
        <div class="field">
          <label for="chart">Umbrella chart</label>
          <input id="chart" name="chart" placeholder="./path, repo/chart or oci:// URL" required />
          <div class="hint">A local path is resolved relative to where the server was started.</div>
        </div>
        <div class="row">
          <div class="field">
            <label for="namespace">Namespace</label>
            <input id="namespace" name="namespace" placeholder="default" />
          </div>
          <div class="field">
            <label for="prefix">Release prefix</label>
            <input id="prefix" name="prefix" placeholder="(none)" />
          </div>
        </div>
        <div class="field">
          <label for="targets">Targets (comma-separated)</label>
          <input id="targets" name="targets" placeholder="all sub-charts" />
        </div>
        <div class="field">
          <label for="excludes">Excludes (comma-separated)</label>
          <input id="excludes" name="excludes" placeholder="none" />
        </div>
        <div class="field">
          <label for="set">Set values (one key=value per line)</label>
          <textarea id="set" name="set" placeholder="tags.front-end=true"></textarea>
        </div>
        <div class="field checkbox">
          <input type="checkbox" id="prefixNs" />
          <label for="prefixNs" style="margin:0">Prefix releases with namespace</label>
        </div>
        <button type="submit" class="primary" id="go">Visualise plan</button>
      </form>
    </section>
    <section class="canvas" id="canvas">
      <div class="empty">Enter an umbrella chart and click <b>Visualise plan</b> to see the weight-ordered deployment.</div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const splitList = (v) => v.split(",").map(s => s.trim()).filter(Boolean);
    const splitLines = (v) => v.split("\n").map(s => s.trim()).filter(Boolean);

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    }

    function renderError(msg) {
      $("canvas").innerHTML = '<div class="err">' + escapeHtml(msg) + '</div>';
    }

    function renderPlan(plan) {
      const tiers = plan.tiers || [];
      let html = '<div class="plan-head">'
        + '<span class="name">' + escapeHtml(plan.chart) + '</span>'
        + '<span class="meta">namespace: <b>' + escapeHtml(plan.namespace) + '</b></span>'
        + '<span class="meta">' + tiers.length + ' weight tier(s)</span>'
        + '</div>';

      if (tiers.length === 0) {
        html += '<div class="empty">No sub-charts found in this umbrella chart.</div>';
        $("canvas").innerHTML = html;
        return;
      }

      tiers.forEach((tier, i) => {
        html += '<div class="tier"><div class="tier-label">deploys at <b>weight ' + tier.weight + '</b> &middot; ' + tier.releases.length + ' release(s), together</div><div class="tier-body">';
        (tier.releases || []).forEach(r => {
          const deployed = r.targeted && r.allowedByTags;
          html += '<div class="release' + (deployed ? "" : " skipped") + '">';
          html += '<div class="r-name">' + escapeHtml(r.release) + '</div>';
          let sub = r.subChart;
          if (r.alias) sub += ' (alias ' + r.alias + ')';
          if (r.appVersion) sub += ' &middot; v' + escapeHtml(r.appVersion);
          html += '<div class="r-sub">' + escapeHtml(sub) + '</div>';
          html += '<div class="badges">';
          html += '<span class="badge ' + (r.targeted ? "on" : "off") + '">' + (r.targeted ? "targeted" : "not targeted") + '</span>';
          html += '<span class="badge ' + (r.allowedByTags ? "on" : "off") + '">' + (r.allowedByTags ? "tags ok" : "tag-excluded") + '</span>';
          html += '</div></div>';
        });
        html += '</div></div>';
        if (i < tiers.length - 1) html += '<div class="arrow">&#8595; then</div>';
      });
      $("canvas").innerHTML = html;
    }

    $("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = $("go");
      btn.disabled = true; btn.textContent = "Resolving…";
      try {
        const body = {
          chart: $("chart").value.trim(),
          namespace: $("namespace").value.trim(),
          prefixReleases: $("prefix").value.trim(),
          prefixReleasesWithNamespace: $("prefixNs").checked,
          targets: splitList($("targets").value),
          excludes: splitList($("excludes").value),
          set: splitLines($("set").value),
        };
        const resp = await fetch("/api/plan", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await resp.json();
        if (!resp.ok) { renderError(data.error || ("request failed: " + resp.status)); return; }
        renderPlan(data);
      } catch (err) {
        renderError(String(err));
      } finally {
        btn.disabled = false; btn.textContent = "Visualise plan";
      }
    });
  </script>
</body>
</html>
